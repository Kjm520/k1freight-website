substitutions:
  _AR_REPO: web-apps
  _SERVICE: k1freight
  _REGION: us-central1
  _IMAGE: $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$SHORT_SHA

steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE}", "."]

  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run","deploy","${_SERVICE}",
        "--image","${_IMAGE}",
        "--region","${_REGION}",
        "--platform","managed",
        "--port","8080",
        "--allow-unauthenticated"
      ]

images:
  - "${_IMAGE}"
